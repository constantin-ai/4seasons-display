<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4Seasons — Display Spalatorie</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    border-bottom: 1px solid #1e1e1e;
    flex-shrink: 0;
  }

  .logo img {
    height: 40px;
    object-fit: contain;
  }

  .clock {
    font-size: 18px;
    font-weight: 400;
    color: #555;
    font-variant-numeric: tabular-nums;
  }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    overflow: hidden;
  }

  .column {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 32px 40px;
  }

  .column:first-child { border-right: 1px solid #1e1e1e; }

  .column-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-shrink: 0;
  }

  .column-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .col-waiting .column-dot { background: #f59e0b; }
  .col-done .column-dot { background: #4ade80; }

  .column-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
  }

  .column-count {
    margin-left: auto;
    font-size: 13px;
    font-weight: 600;
    color: #333;
  }

  .cards-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-content: flex-start;
    overflow-y: auto;
    flex: 1;
    scrollbar-width: none;
  }

  .cards-grid::-webkit-scrollbar { display: none; }

  .card {
    width: calc(33.333% - 11px);
    aspect-ratio: 1;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }

  .col-waiting .card {
    background: #141414;
    border: 1.5px solid #2a2a2a;
  }

  .col-done .card {
    background: #0d1f12;
    border: 1.5px solid #1a3d22;
  }

  .card-plate {
    font-size: clamp(16px, 2.2vw, 28px);
    font-weight: 800;
    letter-spacing: 0.06em;
    text-align: center;
    padding: 0 8px;
    line-height: 1.1;
  }

  .col-waiting .card-plate { color: #ffffff; }
  .col-done .card-plate { color: #4ade80; }

  .card-pulse {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .col-waiting .card-pulse {
    background: #f59e0b;
    animation: pulse-amber 2s infinite;
  }

  .col-done .card-pulse { background: #4ade80; }

  .card-timer {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: #4ade80;
    transition: width 1s linear;
  }

  @keyframes pulse-amber {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .card-new {
    animation: card-in 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .card-expiring .card-plate { color: #1a4d2a !important; }
  .card-expiring { border-color: #111 !important; }

  @keyframes card-in {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .empty-state {
    color: #2a2a2a;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding-top: 8px;
  }

  .refresh-bar {
    height: 2px;
    background: #1e1e1e;
    flex-shrink: 0;
    overflow: hidden;
  }

  .refresh-progress {
    height: 100%;
    background: #4ade80;
    width: 0%;
    transition: width linear;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="Asset 8.png" alt="4Seasons">
  </div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="columns">
  <div class="column col-waiting">
    <div class="column-header">
      <div class="column-dot"></div>
      <div class="column-title">În așteptare</div>
      <div class="column-count" id="count-waiting">0</div>
    </div>
    <div class="cards-grid" id="grid-waiting">
      <div class="empty-state">Nicio mașină</div>
    </div>
  </div>

  <div class="column col-done">
    <div class="column-header">
      <div class="column-dot"></div>
      <div class="column-title">Finalizat</div>
      <div class="column-count" id="count-done">0</div>
    </div>
    <div class="cards-grid" id="grid-done">
      <div class="empty-state">Nicio mașină</div>
    </div>
  </div>
</div>

<div class="refresh-bar">
  <div class="refresh-progress" id="refresh-progress"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbys3S-cKYdnbHeBZO4csfI5iBduOsUgXtclsAK4JYVj2sW0HRhD4yDfZelCHXAUp9oSCQ/exec";
  const REFRESH_INTERVAL = 15000;
  const EXPIRE_MS = 5 * 60 * 1000;
  const AUTO_RELOAD_MS = 2 * 60 * 60 * 1000; // 2 ore

  // Timer intern — independent de SMS sau coloana I
  const finalizedAt = {};

  // ——— AUTO RELOAD LA FIECARE 2 ORE ———
  // Reincarca pagina doar daca nu sunt masini active in acest moment
  setInterval(() => {
    const hasCars = document.querySelectorAll('.card').length > 0;
    if (!hasCars) {
      location.reload();
    } else {
      // Daca sunt masini active, asteapta 5 minute si incearca din nou
      setTimeout(() => location.reload(), 5 * 60 * 1000);
    }
  }, AUTO_RELOAD_MS);

  // ——— CEAS ———
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m + ':' + s;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ——— PROGRESS BAR ———
  function animateProgress() {
    const bar = document.getElementById('refresh-progress');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    setTimeout(() => {
      bar.style.transition = 'width ' + REFRESH_INTERVAL + 'ms linear';
      bar.style.width = '100%';
    }, 50);
  }

  // ——— PROCENT RAMAS ———
  function procentRamas(plate) {
    const ts = finalizedAt[plate];
    if (!ts) return 100;
    const elapsed = Date.now() - ts;
    return Math.max(0, 100 - (elapsed / EXPIRE_MS * 100));
  }

  // ——— E EXPIRAT? ———
  function esteExpirat(plate) {
    const ts = finalizedAt[plate];
    if (!ts) return false;
    return (Date.now() - ts) >= EXPIRE_MS;
  }

  // ——— RENDER CARDURI ———
  function renderGrid(gridId, countId, items, isDone) {
    const grid  = document.getElementById(gridId);
    const count = document.getElementById(countId);

    const visible = isDone
      ? items.filter(i => !esteExpirat(i.nrAuto))
      : items;

    count.textContent = visible.length;

    if (visible.length === 0) {
      grid.innerHTML = '<div class="empty-state">Nicio mașină</div>';
      return;
    }

    const empty = grid.querySelector('.empty-state');
    if (empty) empty.remove();

    const existingPlates = new Set(
      Array.from(grid.querySelectorAll('.card')).map(c => c.dataset.plate)
    );

    Array.from(grid.querySelectorAll('.card')).forEach(card => {
      if (!visible.find(i => i.nrAuto === card.dataset.plate)) {
        card.style.transition = 'opacity 0.5s, transform 0.5s';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.8)';
        setTimeout(() => {
          card.remove();
          if (grid.querySelectorAll('.card').length === 0) {
            grid.innerHTML = '<div class="empty-state">Nicio mașină</div>';
            document.getElementById(countId).textContent = '0';
          }
        }, 500);
      }
    });

    visible.forEach(item => {
      if (!existingPlates.has(item.nrAuto)) {
        const card = document.createElement('div');
        card.className = 'card card-new';
        card.dataset.plate = item.nrAuto;

        const timerHtml = isDone
          ? `<div class="card-timer" style="width:100%"></div>`
          : '';

        card.innerHTML = `
          <div class="card-pulse"></div>
          <div class="card-plate">${item.nrAuto}</div>
          ${timerHtml}
        `;
        grid.appendChild(card);
      }
    });
  }

  // ——— FETCH DATE ———
  async function fetchData() {
    try {
      const resp = await fetch(API_URL + '?t=' + Date.now());
      const data = await resp.json();

      const now = Date.now();

      data.forEach(item => {
        // Notam ora exacta cand vedem prima data status Finalizat
        if (item.status === 'Finalizat' && !finalizedAt[item.nrAuto]) {
          finalizedAt[item.nrAuto] = now;
        }
        // Daca masina s-a intors la In asteptare — resetam timerul
        if (item.status === 'In asteptare' && finalizedAt[item.nrAuto]) {
          delete finalizedAt[item.nrAuto];
        }
      });

      const waiting = data.filter(d => d.status === 'In asteptare');
      const done    = data.filter(d => d.status === 'Finalizat');

      renderGrid('grid-waiting', 'count-waiting', waiting, false);
      renderGrid('grid-done',    'count-done',    done,    true);

    } catch (err) {
      console.error('Eroare fetch:', err);
    }
  }

  // ——— INIT ———
  fetchData();
  animateProgress();

  setInterval(() => {
    fetchData();
    animateProgress();
  }, REFRESH_INTERVAL);

  // Timer bars la fiecare secunda
  setInterval(() => {
    document.querySelectorAll('#grid-done .card').forEach(card => {
      const plate = card.dataset.plate;
      const timerBar = card.querySelector('.card-timer');

      if (timerBar) {
        const procent = procentRamas(plate);
        timerBar.style.width = procent + '%';
        if (procent < 20) card.classList.add('card-expiring');
      }

      if (esteExpirat(plate)) {
        card.style.transition = 'opacity 0.5s, transform 0.5s';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.8)';
        setTimeout(() => {
          card.remove();
          const grid = document.getElementById('grid-done');
          if (grid.querySelectorAll('.card').length === 0) {
            grid.innerHTML = '<div class="empty-state">Nicio mașină</div>';
            document.getElementById('count-done').textContent = '0';
          }
        }, 500);
      }
    });
  }, 1000);
</script>
</body>
</html>
